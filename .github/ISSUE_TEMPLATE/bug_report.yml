name: Bug Report
description: Report a bug in Spry
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: Spry Version
      description: Run `spry --version` to get this
      placeholder: "0.0.4"
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Which command?
      options:
        - spry init
        - spry new
        - spry build
        - spry format
        - spry skill
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
      placeholder: When I run spry build, the generated file has...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug
      value: |
        1. Run `spry init -y`
        2. Run `spry new feature-name`
        3. Write this contract: ...
        4. Run `spry build feature-name`
        5. See error in ...
    validations:
      required: true

  - type: textarea
    id: repository
    attributes:
      label: Repository contract (if applicable)
      description: Paste your abstract repository class
      render: typescript

  - type: textarea
    id: generated
    attributes:
      label: Generated output (if applicable)
      description: Paste the generated file that has the issue
      render: typescript

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "22.x"
